            {

                single:[

                        opts:["A. 非球状不规则簇","B. 类球状凸形簇","C. 带状、环状簇","D. 任意形状簇"],

                    },

                ],

                        q:"对比K-Means与K-Prototypes的相同点与不同点",
                        ans:"相同点：均属于基于原型的划分聚类；仅适配类球形簇；需提前指定K值；依赖初始中心点/原型；抗噪声能力弱，易生成空簇。\n不同点：K-Means仅支持纯数值型数据；K-Prototypes拓展支持数值+分类混合属性数据。",

                review:[]

        let currentPaperData = [];

        // 随机生成一套试卷：固定抽取数量 单选20、简答5、计算2、综述1
        function randomPaper(){
            const container = document.getElementById("paper-container");
            document.getElementById("scoreShow").innerText = "";
            let html = "";
            currentPaperData = [];
            // 收集所有题目
            let allSingle = [];
            let allShort = [];
            let allCalc = [];
            let allReview = [];
            questionBank.forEach(module=>{
                if(module.single) allSingle.push(...module.single);
                if(module.short) allShort.push(...module.short);
                if(module.calc) allCalc.push(...module.calc);
                if(module.review) allReview.push(...module.review);
            });
            // 打乱并截取指定数量
            allSingle.sort(()=>Math.random()-0.5);
            const pickSingle = allSingle.slice(0,20); // 单选固定20道
            allShort.sort(()=>Math.random()-0.5);
            const pickShort = allShort.slice(0,5);    // 简答固定5道
            allCalc.sort(()=>Math.random()-0.5);
            const pickCalc = allCalc.slice(0,2);      // 计算随机2道（题库6道轮换）
            allReview.sort(()=>Math.random()-0.5);
            const pickReview = allReview.slice(0,1);  // 综述随机1道（题库5道轮换）

            let globalNo = 1; // 全局连续题号，不重复

            // 1. 单项选择题
            html += `<h2>一、单项选择题（每题1分，共20分）</h2>`;
            pickSingle.forEach(item=>{
                let uid = `single-${globalNo}`;
                currentPaperData.push({type:"single",uid,item});
                html += `<div class="q-block">
                    <p>${globalNo}. ${item.q}</p>`;
                item.opts.forEach((opt,oIdx)=>{
                    let val = String.fromCharCode(65+oIdx);
                    html += `<p class="radio-item">
                        <input type="radio" name="${uid}" value="${val}" id="${uid}_${val}">
                        <label for="${uid}_${val}">${opt}</label>
                    </p>`;
                })
                html += `<div class="answer-wrap">
                    <button class="show-ans-btn" onclick="toggleAns('${uid}')">显示标准答案</button>
                    <div class="answer" id="${uid}">标准答案：${item.ans}</div>
                </div></div>`;
                globalNo++;
            });

            // 2. 简答题
            html += `<h2>二、简答题（每题8分，共40分）</h2>`;
            pickShort.forEach(item=>{
                let uid = `short-${globalNo}`;
                currentPaperData.push({type:"short",uid,item});
                html += `<div class="q-block">
                    <p>${globalNo}. ${item.q}</p>
                    <div class="user-ans-box">
                        <textarea id="user_${uid}" placeholder="请在此填写你的答案"></textarea>
                    </div>
                    <div class="answer-wrap">
                        <button class="show-ans-btn" onclick="toggleAns('${uid}')">显示参考答案</button>
                        <div class="answer" id="${uid}">参考答案：${item.ans}</div>
                    </div>
                </div>`;
                globalNo++;
            });

            // 3. 计算题
            html += `<h2>三、计算题（每题10分，共20分）</h2>`;
            pickCalc.forEach(item=>{
                let uid = `calc-${globalNo}`;
                currentPaperData.push({type:"calc",uid,item});
                html += `<div class="q-block">
                    <p>${globalNo}. ${item.q}</p>
                    <div class="user-ans-box">
                        <textarea id="user_${uid}" placeholder="请在此写出计算过程与结果"></textarea>
                    </div>
                    <div class="answer-wrap">
                        <button class="show-ans-btn" onclick="toggleAns('${uid}')">显示参考答案</button>
                        <div class="answer" id="${uid}">参考答案：${item.ans}</div>
                    </div>
                </div>`;
                globalNo++;
            });

            // 4. 综述题
            html += `<h2>四、综述题（每题10分，共10分）</h2>`;
            pickReview.forEach(item=>{
                let uid = `review-${globalNo}`;
                currentPaperData.push({type:"review",uid,item});
                html += `<div class="q-block">
                    <p>${globalNo}. ${item.q}</p>
                    <div class="user-ans-box">
                        <textarea id="user_${uid}" placeholder="请在此完整作答"></textarea>
                    </div>
                    <div class="answer-wrap">
                        <button class="show-ans-btn" onclick="toggleAns('${uid}')">显示参考答案</button>
                        <div class="answer" id="${uid}">参考答案：${item.ans}</div>
                    </div>
                </div>`;
                globalNo++;
            });

            container.innerHTML = html;
        }

        // 切换答案显示隐藏
        function toggleAns(id){
            const dom = document.getElementById(id);
            dom.style.display = dom.style.display === "block" ? "none" : "block";
        }

        // 计算总分（简答/计算/综述：输入超过5字符满分，否则0分）
        function calcTotalScore(){
            let total = 0;
            let tipText = "";
            currentPaperData.forEach(que=>{
                const item = que.item;
                if(que.type === "single"){
                    const radios = document.getElementsByName(que.uid);
                    let selectVal = "";
                    radios.forEach(r=>{if(r.checked) selectVal = r.value;});
                    if(selectVal === item.ans){
                        total += item.score;
                        tipText += `<p class="right">${que.item.q}：回答正确，+${item.score}分</p>`;
                    }else{
                        tipText += `<p class="wrong">${que.item.q}：回答错误，正确答案${item.ans}</p>`;
                    }
                }else if(["short","calc","review"].includes(que.type)){
                    const userText = document.getElementById("user_"+que.uid).value.trim();
                    if(userText.length > 5){
                        total += item.score;
                        tipText += `<p class="right">${que.item.q}：已作答，默认满分+${item.score}分（人工核对细节）</p>`;
                    }else{
                        tipText += `<p class="wrong">${que.item.q}：未填写完整，0分</p>`;
                    }
                }
            })
            document.getElementById("scoreShow").innerHTML = `
                <div>你的本次总分：${total} / 100</div>
                <div style="font-size:16px;margin-top:10px;">${tipText}</div>
            `;
        }

        window.onload = randomPaper;
    </script>
