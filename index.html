<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask与大数据可视化期末复习助手</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{text-align:center;color:white;margin-bottom:25px}
        .header h1{font-size:2.3em;margin-bottom:8px;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
        .header p{font-size:1.05em;opacity:.9}
        .stats-bar{display:flex;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
        .stat-item{background:rgba(255,255,255,.2);padding:8px 16px;border-radius:20px;color:white;backdrop-filter:blur(10px);font-size:.9em}
        .stat-item b{font-size:1.2em}
        .nav-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:25px;flex-wrap:wrap}
        .nav-btn{padding:10px 22px;border:none;border-radius:25px;background:rgba(255,255,255,.3);color:white;cursor:pointer;font-size:15px;transition:all .3s;backdrop-filter:blur(10px)}
        .nav-btn:hover{background:rgba(255,255,255,.5);transform:translateY(-2px)}
        .nav-btn.active{background:white;color:#667eea;font-weight:bold}
        .content-card{background:white;border-radius:20px;padding:30px;box-shadow:0 10px 40px rgba(0,0,0,.2);min-height:500px}
        .page{display:none}.page.active{display:block;animation:fadeIn .3s}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .exam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px;margin:20px 0}
        .exam-card{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;padding:18px;color:white;text-align:center}
        .exam-card .num{font-size:2em;font-weight:bold}
        .exam-card .label{font-size:.85em;opacity:.9;margin-top:5px}
        .gen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin:20px 0}
        .gen-card{background:#f8f9fa;border-radius:10px;padding:15px;text-align:center;border-left:4px solid #667eea}
        .gen-card .num{font-size:1.8em;font-weight:bold;color:#667eea}
        .gen-card .label{font-size:.85em;color:#666;margin-top:4px}
        .section-title{font-size:1.3em;color:#333;margin:25px 0 15px;padding-bottom:8px;border-bottom:2px solid #667eea}
        .flip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:25px}
        .flip-card{perspective:1000px;height:320px;cursor:pointer}
        .flip-card-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
        .flip-card.flipped .flip-card-inner{transform:rotateY(180deg)}
        .flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:15px;padding:25px;display:flex;flex-direction:column;justify-content:center;overflow-y:auto}
        .flip-front{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
        .flip-front h3{font-size:1.25em;margin-bottom:10px}
        .flip-front p{font-size:1em;opacity:.9;line-height:1.7}
        .flip-front .hint{position:absolute;bottom:15px;right:18px;font-size:.85em;opacity:.7}
        .flip-back{background:#f8f9fa;transform:rotateY(180deg);color:#333;border:2px solid #667eea}
        .flip-back h4{color:#667eea;margin-bottom:12px;font-size:1.1em}
        .flip-back p,.flip-back li{font-size:.95em;line-height:1.8;color:#444}
        .flip-back ul{margin-left:20px}
        .card-tag{display:inline-block;background:rgba(255,255,255,.25);padding:3px 12px;border-radius:12px;font-size:.85em;margin-bottom:10px}
        .flip-back .card-tag{background:#e8eaff;color:#667eea}
        .code-section{margin-bottom:35px;padding:25px;background:#f8f9fa;border-radius:15px;border-left:5px solid #667eea}
        .code-section h3{color:#667eea;font-size:1.3em;margin-bottom:15px}
        .code-sub{margin:18px 0;padding:18px;background:white;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
        .code-sub h4{color:#764ba2;font-size:1.1em;margin-bottom:12px}
        .code-block{background:#2d2d2d;color:#f8f8f2;padding:18px;border-radius:8px;overflow-x:auto;font-family:'Consolas','Monaco','Courier New',monospace;font-size:.88em;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;margin:12px 0}
        .ck{color:#66d9ef}.cs{color:#e6db74}.cf{color:#a6e22e}.cc{color:#75715e}
        .key-point{background:linear-gradient(135deg,#ffd700,#ffed4e);padding:14px 18px;border-radius:8px;margin:12px 0;border-left:4px solid #ffa500}
        .key-point b{color:#d35400}
        .anno-table{width:100%;border-collapse:collapse;margin:12px 0;background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1)}
        .anno-table th{background:#667eea;color:white;padding:12px;text-align:left}
        .anno-table td{padding:10px 12px;border-bottom:1px solid #e0e0e0}
        .anno-table tr:hover{background:#f5f5f5}
        .anno-table code{background:#f0f0f0;padding:2px 6px;border-radius:4px;color:#d63384;font-family:'Consolas',monospace;font-size:.9em}
        .quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid #f0f0f0;flex-wrap:wrap;gap:10px}
        .q-type{background:#667eea;color:white;padding:4px 14px;border-radius:15px;font-size:13px}
        .q-num{color:#666;font-size:13px}
        .q-text{font-size:17px;line-height:1.8;margin-bottom:20px;color:#333}
        .options{display:flex;flex-direction:column;gap:10px}
        .option{padding:14px 18px;border:2px solid #e0e0e0;border-radius:12px;cursor:pointer;transition:all .3s;display:flex;align-items:flex-start;gap:10px}
        .option:hover{border-color:#667eea;background:#f8f9ff}
        .option.selected{border-color:#667eea;background:#f0f3ff}
        .option.correct{border-color:#4caf50;background:#e8f5e9}
        .option.wrong{border-color:#f44336;background:#ffebee}
        .option-letter{width:26px;height:26px;border-radius:50%;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0;font-size:.9em}
        .option.selected .option-letter{background:#667eea;color:white}
        .option.correct .option-letter{background:#4caf50;color:white}
        .option.wrong .option-letter{background:#f44336;color:white}
        .answer-area{margin-top:20px;padding:18px;background:#f8f9fa;border-radius:12px;display:none}
        .answer-area.show{display:block;animation:fadeIn .3s}
        .answer-label{font-weight:bold;color:#4caf50;margin-bottom:8px}
        .answer-explanation{color:#555;line-height:1.8}
        .knowledge-tag{display:inline-block;background:#e3f2fd;color:#1976d2;padding:3px 10px;border-radius:12px;font-size:12px;margin-top:8px;margin-right:6px}
        .btn-group{display:flex;justify-content:center;gap:12px;padding:14px 20px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:1px solid #e8e8e8;position:sticky;bottom:0;z-index:10;margin:-30px;margin-top:20px}
        .btn{padding:10px 25px;border:none;border-radius:25px;cursor:pointer;font-size:15px;transition:all .3s}
        .btn-primary{background:#667eea;color:white}.btn-primary:hover{background:#5a6fd6;transform:translateY(-2px)}
        .btn-secondary{background:#e0e0e0;color:#666}.btn-secondary:hover{background:#d0d0d0}
        .btn-success{background:#4caf50;color:white}.btn-success:hover{background:#43a047}
        .btn-warning{background:#ff9800;color:white}.btn-warning:hover{background:#f57c00}
        .btn-info{background:#2196f3;color:white}.btn-info:hover{background:#1976d2}
        .btn-danger{background:#f44336;color:white}.btn-danger:hover{background:#d32f2f}
        .auto-toggle{display:flex;align-items:center;gap:6px;font-size:13px;color:#888;cursor:pointer;user-select:none}
        .auto-toggle input{accent-color:#667eea;cursor:pointer}
        .judge-options{display:flex;gap:15px;justify-content:center;margin:20px 0}
        .judge-btn{padding:15px 50px;border:2px solid #e0e0e0;border-radius:12px;cursor:pointer;font-size:1.1em;font-weight:bold;transition:all .3s;background:white}
        .judge-btn:hover{border-color:#667eea;background:#f8f9ff}
        .judge-btn.correct{border-color:#4caf50;background:#e8f5e9;color:#4caf50}
        .judge-btn.wrong{border-color:#f44336;background:#ffebee;color:#f44336}
        .short-input-area textarea{width:100%;min-height:150px;padding:18px;border:2px dashed #b0bec5;border-radius:12px;font-size:14px;line-height:1.8;resize:vertical;font-family:inherit;transition:border-color .3s;background:#fafafa}
        .short-input-area textarea:focus{outline:none;border-color:#667eea;border-style:solid;background:#fff}
        .ref-answer{margin-top:15px;padding:18px;background:#e8f5e9;border-radius:12px;display:none}
        .ref-answer.show{display:block;animation:fadeIn .3s}
        .ref-answer h4{color:#4caf50;margin-bottom:10px}
        .ref-answer p{line-height:1.8;color:#555}
        .fill-code{background:#2d2d2d;color:#f8f8f2;padding:20px;border-radius:8px;overflow-x:auto;font-family:'Consolas','Monaco','Courier New',monospace;font-size:.88em;line-height:1.7;white-space:pre-wrap;word-wrap:break-word;margin:15px 0}
        .blank-btn{display:inline-block;min-width:100px;border:2px dashed #ffc107;border-radius:6px;padding:2px 10px;background:rgba(255,193,7,.15);color:#ffc107;font-weight:bold;cursor:pointer;transition:all .3s;text-align:center;font-family:inherit}
        .blank-btn:hover{background:rgba(255,193,7,.3)}
        .blank-btn.filled{border-style:solid;background:rgba(102,126,234,.2);color:#90caf9;border-color:#667eea}
        .blank-btn.correct{background:rgba(76,175,80,.25);color:#81c784;border-color:#4caf50;border-style:solid}
        .blank-btn.wrong{background:rgba(244,67,54,.25);color:#e57373;border-color:#f44336;border-style:solid}
        .options-popup{position:fixed;background:white;border-radius:12px;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.3);z-index:1000;min-width:280px;max-width:450px;display:none}
        .options-popup.show{display:block;animation:slideDown .3s}
        @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        .popup-title{font-weight:bold;color:#667eea;margin-bottom:12px;font-size:.95em;border-bottom:2px solid #667eea;padding-bottom:8px}
        .popup-option{background:#f8f9fa;padding:10px 14px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all .3s;margin:6px 0;font-family:'Consolas',monospace;font-size:.9em}
        .popup-option:hover{background:#f0f4ff;border-color:#667eea}
        .card-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
        .card-modal.show{display:flex}
        .modal-content{background:white;border-radius:20px;padding:28px;max-width:800px;width:90%;max-height:80vh;overflow-y:auto}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid #f0f0f0}
        .modal-header h3{font-size:18px;color:#333}
        .modal-close{background:none;border:none;font-size:26px;cursor:pointer;color:#999}
        .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(55px,1fr));gap:8px;margin-bottom:18px}
        .card-item{aspect-ratio:1;border:2px solid #e0e0e0;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:bold;font-size:.85em;transition:all .3s}
        .card-item:hover{transform:scale(1.08)}
        .card-item.c{background:#e8f5e9;border-color:#4caf50;color:#4caf50}
        .card-item.w{background:#ffebee;border-color:#f44336;color:#f44336}
        .card-item.u{background:#f5f5f5;border-color:#bdbdbd;color:#757575}
        .card-stats{display:flex;justify-content:space-around;padding:18px;background:#f9f9f9;border-radius:12px}
        .card-stat{text-align:center}
        .card-stat-num{font-size:22px;font-weight:bold;margin-bottom:4px}
        .card-stat-label{font-size:12px;color:#666}
        .filter-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
        .filter-btn{padding:7px 14px;border:2px solid #e0e0e0;border-radius:20px;background:white;cursor:pointer;font-size:13px;transition:all .3s}
        .filter-btn:hover{border-color:#667eea}
        .filter-btn.active{border-color:#667eea;background:#667eea;color:white}
        .wrong-list{display:flex;flex-direction:column;gap:12px}
        .wrong-item{padding:18px;background:#fff5f5;border-left:4px solid #f44336;border-radius:10px;cursor:pointer;transition:all .3s}
        .wrong-item:hover{background:#ffebee}
        .wrong-item .wt{color:#333;margin-bottom:8px}
        .wrong-item .wm{display:flex;gap:8px;font-size:12px;color:#999}
        .empty-state{text-align:center;padding:50px 20px;color:#999}
        .empty-state .icon{font-size:50px;margin-bottom:15px}
        .progress-bar-container{background:#e0e0e0;border-radius:10px;height:18px;overflow:hidden;margin:10px 0}
        .progress-bar{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;transition:width .5s}
        .view-toggle{display:flex;gap:8px;margin-bottom:18px}
        .toggle-btn{padding:8px 18px;border:2px solid #667eea;border-radius:20px;background:white;color:#667eea;cursor:pointer;font-size:13px;transition:all .3s}
        .toggle-btn.active{background:#667eea;color:white}
        .list-view .section{margin-bottom:20px;padding:20px;background:#f8f9fa;border-radius:12px;border-left:4px solid #667eea}
        .list-view .section h4{color:#667eea;margin-bottom:10px}
        .list-view .section p,.list-view .section li{color:#444;line-height:1.8}
        .list-view .section ul{margin-left:18px}
        @media(max-width:768px){
            body{padding:10px}
            .content-card{padding:18px}
            .header h1{font-size:1.6em}
            .flip-grid{grid-template-columns:1fr}
            .flip-card{height:240px}
            .judge-btn{padding:12px 35px}
            .btn-group{flex-wrap:wrap}
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 Flask与大数据可视化期末复习助手</h1>
        <p>Flask · PyQt5 · 数据库 · 数据可视化 · 全面覆盖</p>
    </div>
    <div class="stats-bar" id="globalStats"></div>
    <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchPage('overview',this)">📋 考试概览</button>
        <button class="nav-btn" onclick="switchPage('cards',this)">🃏 知识卡片</button>
        <button class="nav-btn" onclick="switchPage('code-kp',this)">💻 代码知识点</button>
        <button class="nav-btn" onclick="switchPage('quiz',this)">🎯 随机刷题</button>
        <button class="nav-btn" onclick="switchPage('wrong',this)">📕 错题本</button>
        <button class="nav-btn" onclick="switchPage('progress',this)">📊 学习进度</button>
    </div>
    <div class="content-card">
        <div id="overview" class="page active"></div>
        <div id="cards" class="page"></div>
        <div id="code-kp" class="page"></div>
        <div id="quiz" class="page"></div>
        <div id="wrong" class="page"></div>
        <div id="progress" class="page"></div>
    </div>
</div>
<div class="card-modal" id="cardModal">
    <div class="modal-content">
        <div class="modal-header"><h3>📋 答题卡</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div class="card-grid" id="cardGrid"></div>
        <div class="card-stats" id="cardStats"></div>
    </div>
</div>
<div class="options-popup" id="optionsPopup"></div>
<script>

密；db.session.add()添加新记录；commit()提交事务；rollback()在异常时回滚。"}, {"id": 382, "type": "code_fill", "chapter": 1, "topic": "Flask基础", "q": "补全Flask应用的基本创建代码：", "code": "from flask import Flask\n\napp = Flask(____)\napp.config['____'] = True\n\n@app.____('/hello')\ndef hello():\n    return 'Hello, Flask!'\n\nif __name__ == '__main__':\n    app.____(host='0.0.0.0', port=5000, debug=True)", "blanks": ["应用参数", "调试配置", "路由装饰器", "启动方法"], "opts": [["__name__", "__main__", "self", "app"], ["DEBUG", "TESTING", "DEVELOP", "MODE"], ["route", "url", "path", "view"], ["run", "start", "serve", "listen"]], "ans": [0, 0, 0, 0], "exp": "__name__确定应用根路径；DEBUG=True启用调试模式；@app.route()注册路由；app.run()启动开发服务器。"}, {"id": 383, "type": "code_fill", "chapter": 6, "topic": "SQLAlchemy", "q": "补全Flask-SQLAlchemy模型类定义代码：", "code": "class User(db.____):\n    id = db.Column(db.Integer, ____=True)\n    username = db.Column(db.String(80), ____=True)\n    email = db.Column(db.String(120))\n    password_hash = db.Column(db.String(128))\n    \n    def set_password(self, password):\n        self.password_hash = generate_password_hash(password)\n    \n    def check_password(self, password):\n        return ____(self.password_hash, password)", "blanks": ["基类", "主键参数", "唯一参数", "验证函数"], "opts": [["Model", "Base", "Table", "Entity"], ["primary_key", "key", "main", "pk"], ["unique", "only", "single", "distinct"], ["check_password_hash", "verify_password", "compare_hash", "validate"]], "ans": [0, 0, 0, 0], "exp": "db.Model是SQLAlchemy模型基类；primary_key=True设置主键；unique=True确保唯一性；check_password_hash验证密码哈希。"}, {"id": 384, "type": "short", "chapter": 1, "topic": "Flask基础", "q": "简述Flask的概念。", "ans": "Flask 是一个轻量级的 Python Web 微框架，基于 Werkzeug WSGI 工具包和 Jinja2 模板引擎。它采用\"微核心\"设计理念，核心只提供 Web 开发的基本功能，其他功能通过扩展实现，具有灵活、易扩展、学习曲线平缓的特点。"}, {"id": 385, "type": "short", "chapter": 2, "topic": "路由与请求", "q": "简述URL的传递参数的方式，描述一下语法格式。", "ans": "调用route()和add_url_rule()方法注册路由时，在URL规则字符串中加入尖括号标记变量，标记为URL中动态变化部分的内容，将该变量作为参数传递给视图函数。\nURL参数的语法格式：<variable_name>"}, {"id": 386, "type": "short", "chapter": 2, "topic": "路由与请求", "q": "简述Flask中请求上下文和应用上下文包含的对象及用途。", "ans": "请求上下文 (Request Context)：\n- request：封装了 HTTP 请求的所有信息，如请求方法、URL、表单数据、请求头等\n- session：用于存储用户会话信息，在不同请求间保持用户状态\n\n应用上下文 (Application Context)：\n- current_app：指向当前处理请求的应用实例\n- g：全局临时对象，用于在一次请求中存储和共享数据，请求结束后清空"}, {"id": 387, "type": "short", "chapter": 2, "topic": "路由与请求", "q": "简述响应报文的组成。", "ans": "1. 状态行：包含 HTTP 版本、状态码和状态描述\n2. 响应头：包含服务器信息、内容类型、内容长度、Cookie 等元数据\n3. 空行：分隔响应头和响应体\n4. 响应体：服务器返回的实际内容，如 HTML、JSON、图片等"}, {"id": 388, "type": "short", "chapter": 3, "topic": "过滤器", "q": "简述如何自定义过滤器。", "ans": "自定义过滤器需要注册到Flask的过滤器列表中才可以在模板文件中使用，使用装饰器@app.template_filter()可以将自定义过滤器注册到过滤器列表中，template_filter()方法中包含一个可选参数name，该参数表示该过滤器的名称，默认值为被装饰的函数名。"}, {"id": 389, "type": "short", "chapter": 3, "topic": "宏", "q": "简述宏的概念以及定义与调用方法。", "ans": "概念：宏是 Jinja2 模板中的可重用代码块，类似于 Python 中的函数，用于封装重复的 HTML 片段。\n\n定义宏的语法格式：\n{% macro 宏的名称(参数列表) %}\n    宏内部逻辑代码\n{% endmacro %}\n\n调用的语法格式：\n宏的名称(参数列表)"}, {"id": 390, "type": "short", "chapter": 3, "topic": "模板继承", "q": "描述关于模板继承中关于块的语法格式。", "ans": "继承语法格式：{% extends 基模板名称 %}\n\n在基模板中，通过block和endblock定义块：\n{% block 块名称 %}\n基模板代码\n{% endblock 块名称 %}\n\n在子模板中：\n{% extends 基模板名称 %}\n{% block 块名称 %}\n子模板代码\n{% endblock 块名称 %}"}, {"id": 391, "type": "short", "chapter": 4, "topic": "表单处理", "q": "简述如何使用Flask-WTF创建表单。", "ans": "使用 Flask-WTF 创建表单分为四个步骤：\n1. 首先安装 Flask-WTF 扩展包\n2. 定义表单类，该类需要继承自 FlaskForm 基类，在类中根据需要定义不同类型的表单字段，并为每个字段添加相应的验证规则\n3. 在视图函数中实例化这个表单类，判断表单是否被提交且通过验证，如果验证通过则处理表单数据\n4. 在 HTML 模板中渲染表单，需要先渲染表单的隐藏标签（用于防止CSRF攻击），然后依次渲染每个字段的标签和输入框，最后渲染提交按钮"}, {"id": 392, "type": "short", "chapter": 5, "topic": "类视图", "q": "简述如何定义类的视图。", "ans": "Flask 支持两种类视图的定义方式：\n\n普通类视图：创建一个类，继承自 View 基类，在类中实现 dispatch_request 方法，该方法会处理所有的请求并返回响应。最后使用应用实例的 add_url_rule 方法注册这个类视图，注册时需要使用 as_view 方法将类转换为视图函数。\n\n方法类视图：创建一个类，继承自 MethodView 基类，在类中根据需要定义与 HTTP 方法同名的方法（如 get、post、put、delete 等），每个方法处理对应的 HTTP 请求。注册方式与普通类视图相同。"}, {"id": 393, "type": "short", "chapter": 6, "topic": "SQLAlchemy", "q": "简述如何使用Flask-SQLAlchemy连接数据库。", "ans": "使用 Flask-SQLAlchemy 连接数据库分为三个步骤：\n1. 首先安装 Flask-SQLAlchemy 扩展包\n2. 配置应用的数据库连接参数，主要是设置 SQLALCHEMY_DATABASE_URI 配置项，不同类型的数据库有不同的 URI 格式。同时建议关闭 SQLALCHEMY_TRACK_MODIFICATIONS 配置项以避免不必要的警告。\n3. 导入 SQLAlchemy 类，创建一个 SQLAlchemy 实例，并将 Flask 应用实例传入该实例进行初始化。"}, {"id": 394, "type": "short", "chapter": 6, "topic": "关系映射", "q": "简述关系数据库和非关系数据库的特点。", "ans": "关系数据库：\n1. 采用表结构存储数据，数据之间通过关系关联\n2. 支持 SQL 查询语言，功能强大\n3. 严格遵循 ACID 事务特性\n4. 数据一致性高\n\n非关系数据库：\n1. 数据模型灵活，支持键值、文档、图形、列族等多种存储方式\n2. 不支持 SQL 或仅支持有限的 SQL 功能\n3. 水平扩展能力强\n4. 读写性能高"}, {"id": 395, "type": "short", "chapter": 6, "topic": "SQLAlchemy", "q": "数据库操作里面如何实现增删改查。", "ans": "增加数据：db.session提供了add()和add_all()方法，add()增加一条记录，add_all()增加多条数据。\n\n删除数据：使用数据库会话提供的delete()方法，删除完成后需要调用commit()方法将数据提交至数据库。\n\n更新数据：为模型类的字段重新赋值，对字段原先的值进行修改，修改完成后需要调用commit()方法将数据提交至数据库。\n\n查询数据：调用model类中提供的query属性，model类的对象通过访问query属性可以获取一个查询对象，该对象中提供了一些过滤方法和查询方法可用于对查询结果进行过滤和筛选。"}];

function renderOverview(){let s=getStats(),total=questions.length,chCounts={};questions.forEach(q=>{chCounts[q.chapter]=(chCounts[q.chapter]||0)+1});let chCards='';for(let c in chapterNames){let cnt=chCounts[c]||0;if(cnt>0)chCards+='<div class="gen-card"><div class="num">'+cnt+'</div><div class="label">'+chapterNames[c]+'</div></div>'}let html='<div style="background:#fff3cd;border:2px solid #ffc107;border-radius:10px;padding:15px 20px;margin-bottom:20px;font-size:.95em;line-height:1.6"><b style="color:#856404">⚠️ 注意提示</b><p style="color:#856404;margin-top:8px">本题库包含课程测验原题和根据复习资料整理的知识点题目，供复习练习使用。请以课堂教学内容为准。</p></div><h2 class="section-title">📝 题库分布（共'+total+'道）</h2><div class="exam-grid"><div class="exam-card"><div class="num">'+s.choice+'</div><div class="label">选择题</div></div><div class="exam-card"><div class="num">'+s.judge+'</div><div class="label">判断题</div></div><div class="exam-card"><div class="num">'+s.short+'</div><div class="label">简答题</div></div><div class="exam-card"><div class="num">'+s.code_fill+'</div><div class="label">代码填空题</div></div></div><h2 class="section-title">📖 知识模块分布</h2><div class="gen-grid">'+chCards+'</div><h2 class="section-title">📚 考试范围</h2><div style="padding:15px;background:#f8f9fa;border-radius:12px;line-height:1.8"><p><b>主要模块：</b></p><ul style="margin-left:20px;margin-top:8px"><li>Flask Web框架（基础、路由、模板、表单、类视图）</li><li>Flask-SQLAlchemy 数据库操作（ORM、CRUD）</li><li>PyQt5 桌面应用开发（控件、布局、信号槽、对话框）</li><li>数据库连接（SQLite、MySQL）</li><li>数据可视化（Pyecharts 图表绑定 Flask）</li></ul></div><h2 class="section-title">🎯 复习建议</h2><div style="padding:15px;background:#e8f5e9;border-radius:12px;line-height:1.8"><ul style="margin-left:20px"><li><b>选择题+判断题：</b>记忆基础概念，使用知识卡片快速过</li><li><b>简答题：</b>重点理解Flask核心概念，用自己的话复述</li><li><b>代码填空题：</b>熟练掌握Flask路由、Pyecharts图表、登录注册的代码写法</li><li><b>建议顺序：</b>先看"代码知识点"页 → 再用"随机刷题"巩固 → 错题本查漏补缺</li></ul></div>';document.getElementById('overview').innerHTML=html}
function renderCards(){let html='<div class="view-toggle"><button class="toggle-btn '+(state.cardView==='knowledge'?'active':'')+'" onclick="state.cardView=\'knowledge\';renderCards()">📚 知识点列表</button><button class="toggle-btn '+(state.cardView==='flip'?'active':'')+'" onclick="state.cardView=\'flip\';renderCards()">🃏 题目卡片</button></div><div class="filter-bar"><button class="filter-btn active" onclick="filterCards(\'all\',this)">全部</button>';for(let c in chapterNames){html+='<button class="filter-btn" onclick="filterCards(\''+c+'\',this)">'+chapterNames[c]+'</button>'}html+='</div>';if(state.cardView==='knowledge'){let topics={};questions.forEach(q=>{let key=q.chapter+'_'+q.topic;if(!topics[key])topics[key]={chapter:q.chapter,topic:q.topic,qs:[]};topics[key].qs.push(q)});html+='<div class="list-view" id="cardGrid2">';for(let t in topics){let tp=topics[t];let shortQs=tp.qs.filter(q=>q.type==='short');html+='<div class="section" data-chapter="'+tp.chapter+'"><h4>'+(chapterNames[tp.chapter]||'')+' · '+tp.topic+'（'+tp.qs.length+'题）</h4>';if(shortQs.length){html+='<p style="white-space:pre-wrap">'+escHtml(shortQs[0].ans)+'</p>'}else{html+='<ul>';tp.qs.forEach(q=>{if(q.type==='choice')html+='<li>'+escHtml(q.q)+' → <b>'+escHtml(q.opts[q.ans])+'</b></li>';else if(q.type==='judge')html+='<li>'+escHtml(q.q)+' → <b>'+(q.ans?'✓ 正确':'✗ 错误')+'</b></li>';else if(q.type==='code_fill')html+='<li>'+escHtml(q.q)+'</li>'});html+='</ul>'}html+='</div>'}html+='</div>'}else{let cardQs=questions.filter(q=>q.type==='choice'||q.type==='judge');html+='<div class="flip-grid" id="cardGrid2">';cardQs.forEach(q=>{let tag=(chapterNames[q.chapter]||'')+' · '+q.topic;let ft='',bt='';if(q.type==='choice'){let L=['A','B','C','D'];ft='<div style="font-size:.95em;margin-bottom:10px">'+escHtml(q.q)+'</div>';q.opts.forEach((o,i)=>{ft+='<div style="margin:6px 0;font-size:.85em;padding:4px 8px;background:rgba(255,255,255,.15);border-radius:6px">'+L[i]+'. '+escHtml(o)+'</div>'});bt='<b>正确答案：'+L[q.ans]+'</b><br>'+escHtml(q.opts[q.ans]);if(q.exp)bt+='<br><br><span style="font-size:.85em;color:#666">'+escHtml(q.exp)+'</span>'}else{ft='<div style="font-size:.95em">'+escHtml(q.q)+'</div>';bt='<b>正确答案：'+(q.ans?'✓ 正确':'✗ 错误')+'</b>';if(q.exp)bt+='<br><br><span style="font-size:.85em;color:#666">'+escHtml(q.exp)+'</span>'}html+='<div class="flip-card" data-chapter="'+q.chapter+'" onclick="this.classList.toggle(\'flipped\')"><div class="flip-card-inner"><div class="flip-front"><span class="card-tag">'+tag+'</span><div style="flex:1;overflow-y:auto">'+ft+'</div><span class="hint">点击翻转查看答案 →</span></div><div class="flip-back"><span class="card-tag">'+tag+'</span><h4>💡 答案</h4><div style="font-size:.9em;line-height:1.8">'+bt+'</div></div></div></div>'});html+='</div>'}document.getElementById('cards').innerHTML=html}

const codeKPContent='<div class="code-section"><h3>📌 1. Flask 基础应用</h3><div class="code-sub"><h4>1.1 应用创建与配置</h4><div class="code-block"><span class="cc"># 导入Flask</span>\n<span class="ck">from</span> flask <span class="ck">import</span> Flask\n\n<span class="cc"># 创建应用实例</span>\napp = <span class="cf">Flask</span>(<span class="cs">__name__</span>)\n\n<span class="cc"># 配置项设置</span>\napp.config[<span class="cs">\'SECRET_KEY\'</span>] = <span class="cs">\'your-secret-key\'</span>\napp.config[<span class="cs">\'DEBUG\'</span>] = <span class="ck">True</span>\n\n<span class="cc"># 注册路由</span>\n<span class="cf">@app.route</span>(<span class="cs">\'/hello\'</span>)\n<span class="ck">def</span> <span class="cf">hello</span>():\n    <span class="ck">return</span> <span class="cs">\'Hello, Flask!\'</span>\n\n<span class="cc"># 启动服务器</span>\n<span class="ck">if</span> __name__ == <span class="cs">\'__main__\'</span>:\n    app.<span class="cf">run</span>(host=<span class="cs">\'0.0.0.0\'</span>, port=<span class="ck">5000</span>, debug=<span class="ck">True</span>)</div><div class="key-point"><b>💡 考点</b><ul style="margin-left:18px;margin-top:8px"><li>Flask(__name__) 创建应用实例</li><li>默认端口5000，调试模式默认关闭</li><li>依赖：Werkzeug（WSGI工具包）+ Jinja2（模板引擎）</li><li>SECRET_KEY 用于session加密和CSRF防护</li></ul></div></div><div class="code-sub"><h4>1.2 路由与请求</h4><div class="code-block"><span class="cf">@app.route</span>(<span class="cs">\'/user/&lt;name&gt;\'</span>, methods=[<span class="cs">\'GET\'</span>, <span class="cs">\'POST\'</span>])\n<span class="ck">def</span> <span class="cf">user</span>(name):\n    <span class="ck">return</span> f<span class="cs">\'Hello, {name}!\'</span>\n\n<span class="cc"># URL参数转换器</span>\n<span class="cf">@app.route</span>(<span class="cs">\'/post/&lt;int:post_id&gt;\'</span>)\n<span class="ck">def</span> <span class="cf">show_post</span>(post_id):\n    <span class="ck">return</span> f<span class="cs">\'Post {post_id}\'</span>\n\n<span class="cc"># URL反转与重定向</span>\nurl = <span class="cf">url_for</span>(<span class="cs">\'user\'</span>, name=<span class="cs">\'admin\'</span>)\n<span class="ck">return</span> <span class="cf">redirect</span>(<span class="cf">url_for</span>(<span class="cs">\'index\'</span>))</div><div class="key-point"><b>💡 考点</b><ul style="margin-left:18px;margin-top:8px"><li>动态参数用尖括号 &lt;param&gt; 标记</li><li>内置转换器：int、float、string、path</li><li>默认请求方法为GET</li><li>url_for() 根据端点名称反向解析URL</li><li>redirect() 默认状态码302</li></ul></div></div></div><div class="code-section"><h3>📌 2. Jinja2 模板引擎</h3><div class="code-sub"><h4>2.1 模板语法速查</h4><table class="anno-table"><tr><th>语法</th><th>用途</th><th>示例</th></tr><tr><td><code>{{ }}</code></td><td>输出变量</td><td><code>{{ user.name }}</code></td></tr><tr><td><code>{% %}</code></td><td>逻辑代码</td><td><code>{% if x %}...{% endif %}</code></td></tr><tr><td><code>|</code></td><td>过滤器</td><td><code>{{ name | upper }}</code></td></tr><tr><td><code>{# #}</code></td><td>注释</td><td><code>{# 这是注释 #}</code></td></tr></table><div class="key-point"><b>💡 常用过滤器</b><ul style="margin-left:18px;margin-top:8px"><li><code>upper</code> / <code>lower</code> — 大小写转换</li><li><code>length</code> — 获取列表长度</li><li><code>capitalize</code> / <code>title</code> — 首字母大写</li><li><code>safe</code> — 关闭自动转义</li></ul></div></div><div class="code-sub"><h4>2.2 模板继承</h4><div class="code-block"><span class="cc">&lt;!-- base.html 基模板 --&gt;</span>\n<span class="cs">{% block content %}</span>\n默认内容\n<span class="cs">{% endblock %}</span>\n\n<span class="cc">&lt;!-- child.html 子模板 --&gt;</span>\n<span class="cs">{% extends \'base.html\' %}</span>\n<span class="cs">{% block content %}</span>\n子模板内容\n<span class="cs">{% endblock %}</span></div></div><div class="code-sub"><h4>2.3 宏的定义与调用</h4><div class="code-block"><span class="cc">{# 定义宏 #}</span>\n<span class="cs">{% macro input(name, type=\'text\') %}</span>\n&lt;input type="{{ type }}" name="{{ name }}"&gt;\n<span class="cs">{% endmacro %}</span>\n\n<span class="cc">{# 调用宏 #}</span>\n{{ input(\'username\') }}\n\n<span class="cc">{# 从其他文件导入宏 #}</span>\n<span class="cs">{% from \'macro.html\' import input %}</span></div></div></div><div class="code-section"><h3>📌 3. Flask-SQLAlchemy 数据库</h3><div class="code-sub"><h4>3.1 模型定义</h4><div class="code-block"><span class="ck">class</span> <span class="cf">User</span>(db.Model):\n    id = db.Column(db.Integer, primary_key=<span class="ck">True</span>)\n    username = db.Column(db.String(<span class="ck">80</span>), unique=<span class="ck">True</span>)\n    email = db.Column(db.String(<span class="ck">120</span>))\n    password_hash = db.Column(db.String(<span class="ck">128</span>))</div></div><div class="code-sub"><h4>3.2 CRUD 操作</h4><div class="code-block"><span class="cc"># 增加</span>\nuser = User(username=<span class="cs">\'admin\'</span>)\ndb.session.<span class="cf">add</span>(user)      <span class="cc"># 单条</span>\ndb.session.<span class="cf">add_all</span>([u1,u2]) <span class="cc"># 多条</span>\ndb.session.<span class="cf">commit</span>()\n\n<span class="cc"># 查询</span>\nusers = User.query.<span class="cf">all</span>()\nuser = User.query.<span class="cf">filter_by</span>(username=<span class="cs">\'admin\'</span>).<span class="cf">first</span>()\n\n<span class="cc"># 更新</span>\nuser.email = <span class="cs">\'new@email.com\'</span>\ndb.session.<span class="cf">commit</span>()\n\n<span class="cc"># 删除</span>\ndb.session.<span class="cf">delete</span>(user)\ndb.session.<span class="cf">commit</span>()</div><div class="key-point"><b>💡 考点</b><ul style="margin-left:18px;margin-top:8px"><li>模型类继承 <code>db.Model</code></li><li><code>db.Column</code> 定义字段，<code>primary_key</code> 指定主键</li><li><code>commit()</code> 提交事务，<code>rollback()</code> 回滚</li><li>一对多关系：外键定义在"多"侧</li><li>多对多关系：用 <code>db.Table</code> 创建关联表</li></ul></div></div></div><div class="code-section"><h3>📌 4. Pyecharts + Flask 可视化</h3><div class="code-sub"><h4>4.1 折线图数据准备</h4><div class="code-block"><span class="ck">class</span> <span class="cf">SourceDataDemo</span>:\n    <span class="cf">@property</span>\n    <span class="ck">def</span> <span class="cf">line</span>(self):\n        data = <span class="cs">Data</span>()\n        pre_data = pd.<span class="cf">read_excel</span>(<span class="cs">"../data/数据.xlsx"</span>)\n        data.title = <span class="cs">\'折线图示例\'</span>\n        data.values = [\n            {<span class="cs">\'name\'</span>: <span class="cs">\'真实值\'</span>, <span class="cs">\'values\'</span>: pre_data.iloc[:<span class="ck">30</span>,<span class="ck">0</span>].<span class="cf">tolist</span>()},\n            {<span class="cs">\'name\'</span>: <span class="cs">\'预测值\'</span>, <span class="cs">\'values\'</span>: pre_data.iloc[:<span class="ck">30</span>,<span class="ck">1</span>].<span class="cf">tolist</span>()},\n        ]\n        data.legend = [key[<span class="cs">\'name\'</span>] <span class="ck">for</span> key <span class="ck">in</span> data.values]\n        data.xAxis = [x <span class="ck">for</span> x <span class="ck">in</span> <span class="cf">range</span>(<span class="ck">30</span>)]\n        <span class="ck">return</span> data</div><div class="key-point"><b>💡 考点</b><ul style="margin-left:18px;margin-top:8px"><li><code>@property</code> 使方法可以像属性一样调用</li><li><code>data.values</code> 格式：[{\'name\':\'xx\',\'values\':[...]}]</li><li>饼图 values 格式：[{\'name\':\'xx\',\'value\':数字}]</li><li><code>zip()</code> 将两列数据配对</li><li><code>tolist()</code> 将 pandas Series 转为 Python 列表</li></ul></div></div><div class="code-sub"><h4>4.2 饼图数据准备</h4><div class="code-block">    <span class="cf">@property</span>\n    <span class="ck">def</span> <span class="cf">pie</span>(self):\n        data = <span class="cs">Data</span>()\n        housenum = pd.<span class="cf">read_excel</span>(<span class="cs">"../data/数据.xlsx"</span>)\n        data.title = <span class="cs">\'占比图\'</span>\n        data.values = [{<span class="cs">\'name\'</span>: x, <span class="cs">\'value\'</span>: y}\n            <span class="ck">for</span> x, y <span class="ck">in</span> <span class="cf">zip</span>(housenum[<span class="ck">0</span>], housenum[<span class="ck">1</span>])]\n        data.legend = [key[<span class="cs">\'name\'</span>] <span class="ck">for</span> key <span class="ck">in</span> data.values]\n        <span class="ck">return</span> data</div></div></div><div class="code-section"><h3>📌 5. 登录注册业务逻辑</h3><div class="code-sub"><h4>5.1 登录核心流程</h4><div class="code-block"><span class="cf">@app.route</span>(<span class="cs">\'/login\'</span>, methods=[<span class="cs">\'GET\'</span>, <span class="cs">\'POST\'</span>])\n<span class="ck">def</span> <span class="cf">login</span>():\n    <span class="ck">if</span> <span class="cs">"user_id"</span> <span class="ck">in</span> session:\n        <span class="ck">return</span> <span class="cf">redirect</span>(<span class="cf">url_for</span>(<span class="cs">"index"</span>))\n    <span class="ck">if</span> request.method == <span class="cs">"POST"</span>:\n        username = request.form.<span class="cf">get</span>(<span class="cs">"username"</span>, <span class="cs">""</span>).strip()\n        password = request.form.<span class="cf">get</span>(<span class="cs">"password"</span>, <span class="cs">""</span>)\n        user = User.query.<span class="cf">filter_by</span>(username=username).<span class="cf">first</span>()\n        <span class="ck">if</span> user <span class="ck">and</span> user.<span class="cf">check_password</span>(password):\n            session[<span class="cs">"user_id"</span>] = user.id\n            <span class="cf">flash</span>(<span class="cs">"登录成功"</span>, <span class="cs">"info"</span>)\n            <span class="ck">return</span> <span class="cf">redirect</span>(<span class="cf">url_for</span>(<span class="cs">"index"</span>))\n        <span class="ck">else</span>:\n            <span class="cf">flash</span>(<span class="cs">"用户名或密码错误"</span>, <span class="cs">"error"</span>)\n    <span class="ck">return</span> <span class="cf">render_template</span>(<span class="cs">"login.html"</span>)</div><div class="key-point"><b>💡 考点</b><ul style="margin-left:18px;margin-top:8px"><li><code>session</code> 存储用户信息保持登录状态</li><li><code>request.form.get()</code> 获取表单数据</li><li><code>flash()</code> 消息闪现，模板用 <code>get_flashed_messages()</code></li><li><code>db.session.rollback()</code> 异常时回滚事务</li></ul></div></div></div>';
function renderQuiz(){if(!state.quizOrder.length){state.quizOrder=shuffle(questions.map((_,i)=>i));state.quizIndex=0}if(state.quizIndex>=state.quizOrder.length)state.quizIndex=0;if(!state.quizOrder.length){document.getElementById('quiz').innerHTML='<div class="empty-state"><div class="icon">📭</div><p>当前筛选题型无题目</p></div>';return}let idx=state.quizOrder[state.quizIndex],q=questions[idx],answered=state.answered[q.id];let html='<div class="filter-bar"><button class="filter-btn '+(state.quizFilter==='all'?'active':'')+'" onclick="filterQuiz(\'all\',this)">全部</button><button class="filter-btn '+(state.quizFilter==='choice'?'active':'')+'" onclick="filterQuiz(\'choice\',this)">选择题</button><button class="filter-btn '+(state.quizFilter==='judge'?'active':'')+'" onclick="filterQuiz(\'judge\',this)">判断题</button><button class="filter-btn '+(state.quizFilter==='short'?'active':'')+'" onclick="filterQuiz(\'short\',this)">简答题</button><button class="filter-btn '+(state.quizFilter==='code_fill'?'active':'')+'" onclick="filterQuiz(\'code_fill\',this)">代码填空</button></div><div class="quiz-header"><span class="q-type" style="background:'+getTypeColor(q.type)+'">'+getTypeName(q.type)+'</span><span class="q-num">第 '+(state.quizIndex+1)+' / '+state.quizOrder.length+' 题</span><span class="knowledge-tag">'+(chapterNames[q.chapter]||'')+' · '+q.topic+'</span></div><div class="q-text">'+escHtml(q.q).replace(/\n/g,'<br>')+'</div>';if(q.type==='choice'){let L=['A','B','C','D'];html+='<div class="options">';q.opts.forEach((o,i)=>{let c='option';if(answered!==undefined){if(i===q.ans)c+=' correct';else if(i===answered&&i!==q.ans)c+=' wrong'}html+='<div class="'+c+'" onclick="answerQuiz('+q.id+','+i+')"><span class="option-letter">'+L[i]+'</span><span>'+escHtml(o)+'</span></div>'});html+='</div>'}else if(q.type==='judge'){html+='<div class="judge-options"><div class="judge-btn '+(answered===true?'correct':(answered===false&&q.ans===true?'wrong':''))+'" onclick="answerQuiz('+q.id+',true)">✓ 正确</div><div class="judge-btn '+(answered===false?'correct':(answered===true&&q.ans===false?'wrong':''))+'" onclick="answerQuiz('+q.id+',false)">✗ 错误</div></div>'}else if(q.type==='short'){html+='<div class="short-input-area"><textarea placeholder="在这里写下你的答案..." id="shortInput_'+q.id+'">'+(answered||'')+'</textarea><div style="margin-top:10px;display:flex;gap:10px"><button class="btn btn-primary" onclick="saveShort('+q.id+')">💾 保存答案</button><button class="btn btn-success" onclick="showRefAnswer('+q.id+')">📖 参考答案</button></div></div><div class="ref-answer" id="ref_'+q.id+'"><h4>📖 参考答案</h4><p style="white-space:pre-wrap">'+escHtml(q.ans)+'</p></div>'}else if(q.type==='code_fill'){html+=renderCodeFill(q,answered)}if(answered!==undefined&&q.type!=='short'&&q.type!=='code_fill'){let ok=answered===q.ans;html+='<div class="answer-area show"><div class="answer-label">'+(ok?'✅ 回答正确！':'❌ 回答错误')+'</div>'+(q.exp?'<div class="answer-explanation">'+escHtml(q.exp)+'</div>':'')+'</div>'}html+='<div class="btn-group"><label class="auto-toggle"><input type="checkbox" '+(state.autoNext?'checked':'')+' onchange="state.autoNext=this.checked"> 自动下一题</label><button class="btn btn-info" onclick="showCardModal()">📋 答题卡</button><button class="btn btn-secondary" onclick="prevQuestion()">← 上一题</button><button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button><button class="btn btn-warning" onclick="reshuffleQuiz()">🔄 重新洗牌</button></div>';document.getElementById('quiz').innerHTML=html}
function renderCodeFill(q,answered){if(!q.code||!q.blanks||!q.opts)return'<div style="padding:20px;background:#fff3cd;border-radius:8px;margin:15px 0">⚠️ 题目数据不完整</div>';let parts=q.code.split('____');let html='<div class="fill-code">';parts.forEach((p,i)=>{html+=escHtml(p);if(i<q.blanks.length){let val=state.fillAnswers[q.id+'_'+i];let cls='blank-btn';if(val!==undefined){cls+=' filled';if(answered!==undefined){cls+=val===q.ans[i]?' correct':' wrong'}html+='<span class="'+cls+'" onclick="showFillOptions('+q.id+','+i+',event)">'+escHtml(q.opts[i][val])+'</span>'}else{html+='<span class="'+cls+'" onclick="showFillOptions('+q.id+','+i+',event)">['+q.blanks[i]+']</span>'}}});html+='</div>';if(answered===null||answered===undefined){html+='<div style="text-align:center;margin-top:15px"><button class="btn btn-success" onclick="submitFill('+q.id+')">✅ 提交答案</button></div>'}if(answered!==undefined&&answered!==null){let ok=true;for(let i=0;i<q.ans.length;i++){if(state.fillAnswers[q.id+'_'+i]!==q.ans[i])ok=false}html+='<div class="answer-area show"><div class="answer-label">'+(ok?'✅ 全部正确！':'❌ 部分错误')+'</div><div class="answer-explanation">'+escHtml(q.exp)+'</div></div>'}return html}
function showFillOptions(qid,bi,e){let q=questions.find(x=>x.id===qid);if(state.answered[qid]!==undefined)return;let popup=document.getElementById('optionsPopup');let html='<div class="popup-title">'+q.blanks[bi]+'</div>';q.opts[bi].forEach((o,i)=>{html+='<div class="popup-option" onclick="selectFill('+qid+','+bi+','+i+')">'+escHtml(o)+'</div>'});popup.innerHTML=html;popup.classList.add('show');let rect=e.target.getBoundingClientRect();popup.style.left=Math.min(rect.left,window.innerWidth-300)+'px';popup.style.top=(rect.bottom+5)+'px';setTimeout(()=>document.addEventListener('click',closeFillPopup,{once:true}),10)}
function closeFillPopup(){document.getElementById('optionsPopup').classList.remove('show')}
function selectFill(qid,bi,oi){state.fillAnswers[qid+'_'+bi]=oi;closeFillPopup();renderQuiz()}
function submitFill(qid){let q=questions.find(x=>x.id===qid);let ok=true;for(let i=0;i<q.blanks.length;i++){if(state.fillAnswers[qid+'_'+i]===undefined){alert('请先完成所有填空！');return}if(state.fillAnswers[qid+'_'+i]!==q.ans[i])ok=false}state.answered[qid]=ok;state.quizStats.total++;if(ok)state.quizStats.correct++;if(!ok&&!state.wrongBook.find(w=>w.id===qid)){state.wrongBook.push({id:qid,type:q.type,q:q.q,chapter:q.chapter,topic:q.topic})}saveState();renderQuiz();updateGlobalStats()}
function answerQuiz(qid,val){if(state.answered[qid]!==undefined)return;let q=questions.find(x=>x.id===qid);state.answered[qid]=val;let ok=val===q.ans;state.quizStats.total++;if(ok)state.quizStats.correct++;if(!ok&&!state.wrongBook.find(w=>w.id===qid)){state.wrongBook.push({id:qid,type:q.type,q:q.q,chapter:q.chapter,topic:q.topic})}saveState();renderQuiz();updateGlobalStats();if(state.autoNext)setTimeout(nextQuestion,1200)}
function saveShort(qid){let input=document.getElementById('shortInput_'+qid);if(input)state.answered[qid]=input.value}
function showRefAnswer(qid){let el=document.getElementById('ref_'+qid);if(el)el.classList.toggle('show')}
function nextQuestion(){state.quizIndex=(state.quizIndex+1)%state.quizOrder.length;renderQuiz()}
function prevQuestion(){state.quizIndex=(state.quizIndex-1+state.quizOrder.length)%state.quizOrder.length;renderQuiz()}
function reshuffleQuiz(){state.quizOrder=shuffle(questions.map((_,i)=>i));state.quizIndex=0;renderQuiz()}
function filterQuiz(type,btn){state.quizFilter=type;document.querySelectorAll('#quiz .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(type==='all'){state.quizOrder=shuffle(questions.map((_,i)=>i))}else{state.quizOrder=shuffle(questions.map((q,i)=>q.type===type?i:-1).filter(i=>i>=0))}state.quizIndex=0;state.answered={};state.fillAnswers={};renderQuiz()}
function showCardModal(){let grid=document.getElementById('cardGrid');let html='';state.quizOrder.forEach((qi,i)=>{let q=questions[qi],a=state.answered[q.id];let c='card-item';if(a===undefined)c+=' u';else if(a===q.ans||(q.type==='short'&&a))c+=' c';else c+=' w';html+='<div class="'+c+'" onclick="goToQuestion('+i+')">'+(i+1)+'</div>'});grid.innerHTML=html;let stats=document.getElementById('cardStats'),ans=Object.keys(state.answered).length,cor=state.quizStats.correct,wrg=state.quizStats.total-cor;stats.innerHTML='<div class="card-stat"><div class="card-stat-num" style="color:#667eea">'+questions.length+'</div><div class="card-stat-label">总题数</div></div><div class="card-stat"><div class="card-stat-num" style="color:#ff9800">'+ans+'</div><div class="card-stat-label">已答</div></div><div class="card-stat"><div class="card-stat-num" style="color:#4caf50">'+cor+'</div><div class="card-stat-label">正确</div></div><div class="card-stat"><div class="card-stat-num" style="color:#f44336">'+wrg+'</div><div class="card-stat-label">错误</div></div>';document.getElementById('cardModal').classList.add('show')}
function closeModal(){document.getElementById('cardModal').classList.remove('show')}
function goToQuestion(i){state.quizIndex=i;closeModal();renderQuiz()}
function renderWrong(){let html='<h2 class="section-title">📕 错题本</h2>';if(!state.wrongBook.length){html+='<div class="empty-state"><div class="icon">🎉</div><p>暂无错题，继续保持！</p></div>'}else{html+='<div class="wrong-list">';state.wrongBook.forEach(w=>{let t=w.q||'';html+='<div class="wrong-item" onclick="goToWrongQuestion('+w.id+')"><div class="wt">['+getTypeName(w.type)+'] '+escHtml(t.substring(0,60))+(t.length>60?'...':'')+'</div><div class="wm"><span>'+(chapterNames[w.chapter]||'')+'</span><span>'+w.topic+'</span></div></div>'});html+='</div><div style="text-align:center;margin-top:20px"><button class="btn btn-danger" onclick="clearWrongBook()">🗑️ 清空错题本</button></div>'}document.getElementById('wrong').innerHTML=html}
function goToWrongQuestion(qid){let idx=state.quizOrder.findIndex(i=>questions[i].id===qid);if(idx===-1){state.quizOrder=[questions.findIndex(q=>q.id===qid)];state.quizIndex=0}else state.quizIndex=idx;delete state.answered[qid];switchPage('quiz',document.querySelectorAll('.nav-btn')[3])}
function clearWrongBook(){if(confirm('确定清空错题本？')){state.wrongBook=[];saveState();renderWrong()}}
function renderProgress(){let total=questions.length,ans=Object.keys(state.answered).length,pct=total?Math.round(ans/total*100):0,byType={},byCh={};['choice','judge','short','code_fill'].forEach(t=>{let qs=questions.filter(q=>q.type===t),done=qs.filter(q=>state.answered[q.id]!==undefined).length;byType[t]={total:qs.length,done}});for(let c in chapterNames){let qs=questions.filter(q=>q.chapter==c);if(!qs.length)continue;let done=qs.filter(q=>state.answered[q.id]!==undefined).length;byCh[c]={total:qs.length,done}}let html='<h2 class="section-title">📊 总体进度</h2><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span>已完成 '+ans+'/'+total+' 题</span><span>'+pct+'%</span></div><div class="progress-bar-container"><div class="progress-bar" style="width:'+pct+'%"></div></div><div class="card-stats" style="margin:20px 0"><div class="card-stat"><div class="card-stat-num" style="color:#667eea">'+state.quizStats.total+'</div><div class="card-stat-label">总答题次数</div></div><div class="card-stat"><div class="card-stat-num" style="color:#4caf50">'+state.quizStats.correct+'</div><div class="card-stat-label">正确次数</div></div><div class="card-stat"><div class="card-stat-num" style="color:#f44336">'+(state.quizStats.total-state.quizStats.correct)+'</div><div class="card-stat-label">错误次数</div></div><div class="card-stat"><div class="card-stat-num" style="color:#ff9800">'+(state.quizStats.total?Math.round(state.quizStats.correct/state.quizStats.total*100):0)+'%</div><div class="card-stat-label">正确率</div></div></div><h2 class="section-title">📝 按题型进度</h2>';for(let t in byType){let d=byType[t],p=d.total?Math.round(d.done/d.total*100):0;html+='<div style="margin:12px 0"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:'+getTypeColor(t)+'">'+getTypeName(t)+'</span><span>'+d.done+'/'+d.total+' ('+p+'%)</span></div><div class="progress-bar-container"><div class="progress-bar" style="width:'+p+'%;background:'+getTypeColor(t)+'"></div></div></div>'}html+='<h2 class="section-title">📖 按模块进度</h2>';for(let c in byCh){let d=byCh[c],p=d.total?Math.round(d.done/d.total*100):0;html+='<div style="margin:12px 0"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>'+chapterNames[c]+'</span><span>'+d.done+'/'+d.total+' ('+p+'%)</span></div><div class="progress-bar-container"><div class="progress-bar" style="width:'+p+'%"></div></div></div>'}html+='<div style="text-align:center;margin-top:25px"><button class="btn btn-danger" onclick="resetAll()">🗑️ 重置所有进度</button></div>';document.getElementById('progress').innerHTML=html}
function resetAll(){if(confirm('确定重置所有学习进度？此操作不可恢复！')){state.answered={};state.wrongBook=[];state.quizStats={total:0,correct:0};state.fillAnswers={};saveState();updateGlobalStats();renderProgress()}}
function updateGlobalStats(){let total=questions.length,ans=Object.keys(state.answered).length,cor=state.quizStats.correct,acc=state.quizStats.total?Math.round(cor/state.quizStats.total*100):0;document.getElementById('globalStats').innerHTML='<div class="stat-item">题库 <b>'+total+'</b> 题</div><div class="stat-item">已答 <b>'+ans+'</b></div><div class="stat-item">正确 <b style="color:#4caf50">'+cor+'</b></div><div class="stat-item">正确率 <b>'+acc+'%</b></div><div class="stat-item">错题 <b style="color:#f44336">'+state.wrongBook.length+'</b></div>'}
renderOverview();updateGlobalStats();
</script>
</body>
</html>
